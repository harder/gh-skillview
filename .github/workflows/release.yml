name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  id-token: write        # SLSA attestations
  attestations: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            go_name: windows-amd64
            ext: .exe
          - rid: win-arm64
            os: windows-11-arm
            go_name: windows-arm64
            ext: .exe
          - rid: linux-x64
            os: ubuntu-latest
            go_name: linux-amd64
            ext: ''
          - rid: linux-arm64
            os: ubuntu-24.04-arm
            go_name: linux-arm64
            ext: ''
          - rid: osx-x64
            os: macos-13
            go_name: darwin-amd64
            ext: ''
          - rid: osx-arm64
            os: macos-14
            go_name: darwin-arm64
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux AOT toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish AOT (extension binary)
        shell: bash
        run: |
          dotnet publish src/SkillView.GhExtension/SkillView.GhExtension.csproj \
            -c Release -r ${{ matrix.rid }} \
            -p:PublishAot=true -p:StripSymbols=true \
            -o dist/ext

      - name: Publish AOT (standalone binary)
        shell: bash
        run: |
          dotnet publish src/SkillView.App/SkillView.App.csproj \
            -c Release -r ${{ matrix.rid }} \
            -p:PublishAot=true -p:StripSymbols=true \
            -o dist/app

      - name: Stage release assets
        shell: bash
        run: |
          set -e
          mkdir -p dist/out
          # Extension asset: Go-style naming per cli/gh-extension-precompile
          mv "dist/ext/gh-skillview${{ matrix.ext }}" \
             "dist/out/gh-skillview-${{ matrix.go_name }}${{ matrix.ext }}"
          # Standalone asset: .NET RID naming
          mv "dist/app/skillview${{ matrix.ext }}" \
             "dist/out/skillview-${{ matrix.rid }}${{ matrix.ext }}"

      - name: Record binary sizes
        shell: bash
        run: ls -lh dist/out

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.rid }}
          path: dist/out/*
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: cli/gh-extension-precompile@v2
        with:
          build_script_override: script/build-noop.sh
          generate_attestations: true

  # Dark-launch scaffold only. Generates a formula from release assets but does
  # not commit or push to the tap yet.
  publish-homebrew:
    needs: [build, release]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && vars.HOMEBREW_TAP_ENABLED == 'true' }}
    env:
      RELEASE_REF: ${{ github.ref_name }}
      RELEASE_REPO: ${{ github.repository }}
      HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: artifacts/
          merge-multiple: true

      - name: Generate formula
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p generated/homebrew
          DARWIN_ARM64_URL="https://github.com/${RELEASE_REPO}/releases/download/${RELEASE_REF}/skillview-osx-arm64"
          DARWIN_X64_URL="https://github.com/${RELEASE_REPO}/releases/download/${RELEASE_REF}/skillview-osx-x64"
          LINUX_ARM64_URL="https://github.com/${RELEASE_REPO}/releases/download/${RELEASE_REF}/skillview-linux-arm64"
          LINUX_X64_URL="https://github.com/${RELEASE_REPO}/releases/download/${RELEASE_REF}/skillview-linux-x64"
          DARWIN_ARM64_SHA=$(sha256sum artifacts/skillview-osx-arm64 | cut -d' ' -f1)
          DARWIN_X64_SHA=$(sha256sum artifacts/skillview-osx-x64 | cut -d' ' -f1)
          LINUX_ARM64_SHA=$(sha256sum artifacts/skillview-linux-arm64 | cut -d' ' -f1)
          LINUX_X64_SHA=$(sha256sum artifacts/skillview-linux-x64 | cut -d' ' -f1)
          sed \
            -e "s|{{VERSION}}|${RELEASE_REF#v}|g" \
            -e "s|{{URL_DARWIN_ARM64}}|${DARWIN_ARM64_URL}|g" \
            -e "s|{{URL_DARWIN_X64}}|${DARWIN_X64_URL}|g" \
            -e "s|{{URL_LINUX_ARM64}}|${LINUX_ARM64_URL}|g" \
            -e "s|{{URL_LINUX_X64}}|${LINUX_X64_URL}|g" \
            -e "s|{{SHA_DARWIN_ARM64}}|${DARWIN_ARM64_SHA}|g" \
            -e "s|{{SHA_DARWIN_X64}}|${DARWIN_X64_SHA}|g" \
            -e "s|{{SHA_LINUX_ARM64}}|${LINUX_ARM64_SHA}|g" \
            -e "s|{{SHA_LINUX_X64}}|${LINUX_X64_SHA}|g" \
            packaging/homebrew/skillview.rb.tmpl \
            > generated/homebrew/skillview.rb
          printf 'Dark-launch only: generated formula for %s (target tap: %s)\n' "${RELEASE_REF}" "${HOMEBREW_TAP_REPO:-harder/homebrew-tap}"

      - name: Upload generated formula
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula-${{ github.ref_name }}
          path: generated/homebrew/skillview.rb
          retention-days: 30

  # Dark-launch scaffold only. Generates WinGet manifests from release assets
  # but does not submit them to microsoft/winget-pkgs yet.
  publish-winget:
    needs: [build, release]
    runs-on: windows-latest
    if: ${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') && vars.WINGET_ENABLED == 'true' }}
    env:
      RELEASE_REF: ${{ github.ref_name }}
      RELEASE_REPO: ${{ github.repository }}
      WINGET_PACKAGE_ID: harder.SkillView
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-win-*
          path: artifacts/
          merge-multiple: true

      - name: Generate manifests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path generated/winget | Out-Null
          $version = $env:RELEASE_REF.Substring(1)
          $urlX64 = "https://github.com/$env:RELEASE_REPO/releases/download/$env:RELEASE_REF/skillview-win-x64.exe"
          $urlArm64 = "https://github.com/$env:RELEASE_REPO/releases/download/$env:RELEASE_REF/skillview-win-arm64.exe"
          $shaX64 = (Get-FileHash artifacts/skillview-win-x64.exe -Algorithm SHA256).Hash
          $shaArm64 = (Get-FileHash artifacts/skillview-win-arm64.exe -Algorithm SHA256).Hash

          (Get-Content packaging/winget/harder.SkillView.yaml.tmpl -Raw).Replace('{{VERSION}}', $version) |
            Set-Content generated/winget/$env:WINGET_PACKAGE_ID.yaml

          (Get-Content packaging/winget/harder.SkillView.locale.en-US.yaml.tmpl -Raw).Replace('{{VERSION}}', $version) |
            Set-Content generated/winget/$env:WINGET_PACKAGE_ID.locale.en-US.yaml

          ((Get-Content packaging/winget/harder.SkillView.installer.yaml.tmpl -Raw).
            Replace('{{VERSION}}', $version).
            Replace('{{URL_WIN_X64}}', $urlX64).
            Replace('{{SHA_WIN_X64}}', $shaX64).
            Replace('{{URL_WIN_ARM64}}', $urlArm64).
            Replace('{{SHA_WIN_ARM64}}', $shaArm64)) |
            Set-Content generated/winget/$env:WINGET_PACKAGE_ID.installer.yaml

          Write-Host "Dark-launch only: generated WinGet manifests for $env:WINGET_PACKAGE_ID $version"

      - name: Upload generated WinGet manifests
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifests-${{ github.ref_name }}
          path: generated/winget/*
          retention-days: 30

  notify-failure:
    needs: [build, release, publish-homebrew, publish-winget]
    if: failure()
    runs-on: ubuntu-latest
    env:
      RELEASE_REF: ${{ github.ref_name }}
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Release workflow failed on ${process.env.RELEASE_REF}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100
            });

            const existing = openIssues.find(issue => issue.title === title);
            if (existing) {
              core.info(`Open failure issue already exists: #${existing.number}`);
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body: [
                `The release workflow failed for \`${process.env.RELEASE_REF}\`.`,
                '',
                `- Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
                '- Workflow guide: `.github/workflows/README.md`',
                '- Rollback runbook: `docs/runbooks/release-rollback.md` *(planned backlog item #8)*'
              ].join('\n')
            });
